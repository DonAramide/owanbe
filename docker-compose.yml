services:
  postgres:
    image: postgres:14
    container_name: owanbe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: owanbe
    ports:
      - "5432:5432"
    volumes:
      - owanbe_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d owanbe"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  owanbe_pgdata:
