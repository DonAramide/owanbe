openapi: 3.0.3
info:
  title: Owanbe — Onboarding & admin (partial)
  version: 0.1.0
  description: >
    Request/response shapes for vendor onboarding and admin review.
    All routes require Bearer JWT. Effective permissions = union of role defaults + optional future grants.

servers:
  - url: https://api.owanbe.example/v1

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TenantId:
      name: X-Tenant-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
    VendorId:
      name: vendorId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ApplicationId:
      name: applicationId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: FORBIDDEN
        message:
          type: string
        details:
          type: object

    VendorApplication:
      type: object
      properties:
        id: { type: string, format: uuid }
        vendorId: { type: string, format: uuid }
        status:
          type: string
          enum: [applied, under_review, approved, rejected]
        submittedAt: { type: string, format: date-time, nullable: true }
        reviewedAt: { type: string, format: date-time, nullable: true }
        reviewerUserId: { type: string, format: uuid, nullable: true }
        reviewNotes: { type: string, nullable: true }
        rejectionReason: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    VendorApplicationBusiness:
      type: object
      required: [legalName, countryCode]
      properties:
        legalName: { type: string }
        tradingName: { type: string, nullable: true }
        registrationNumber: { type: string, nullable: true }
        taxId: { type: string, nullable: true }
        businessType: { type: string, nullable: true }
        addressLine1: { type: string, nullable: true }
        addressLine2: { type: string, nullable: true }
        city: { type: string, nullable: true }
        stateRegion: { type: string, nullable: true }
        postalCode: { type: string, nullable: true }
        countryCode: { type: string, minLength: 2, maxLength: 2 }
        phoneE164: { type: string, nullable: true }
        websiteUrl: { type: string, format: uri, nullable: true }

    CreateApplicationRequest:
      type: object
      properties:
        idempotencyKey:
          type: string
          minLength: 8
          maxLength: 128

    CreateApplicationResponse:
      type: object
      required: [application]
      properties:
        application:
          $ref: '#/components/schemas/VendorApplication'

    SubmitApplicationResponse:
      type: object
      required: [application]
      properties:
        application:
          $ref: '#/components/schemas/VendorApplication'

    AdminApplicationDetail:
      allOf:
        - $ref: '#/components/schemas/VendorApplication'
        - type: object
          properties:
            business:
              $ref: '#/components/schemas/VendorApplicationBusiness'
            bankAccountsMasked:
              type: array
              items:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  bankName: { type: string }
                  accountNumberLast4: { type: string }
                  verificationStatus:
                    type: string
                    enum: [pending, verified, failed]
            kycSubmissionIds:
              type: array
              items: { type: string, format: uuid }
            portfolioItemCount:
              type: integer

    ApproveApplicationRequest:
      type: object
      properties:
        reviewNotes:
          type: string
          maxLength: 4000

    RejectApplicationRequest:
      type: object
      required: [rejectionReason]
      properties:
        rejectionReason:
          type: string
          maxLength: 4000
        reviewNotes:
          type: string
          maxLength: 4000

    ApplicationEvent:
      type: object
      properties:
        id: { type: integer, format: int64 }
        fromStatus:
          type: string
          nullable: true
          enum: [applied, under_review, approved, rejected]
        toStatus:
          type: string
          enum: [applied, under_review, approved, rejected]
        actorUserId: { type: string, format: uuid, nullable: true }
        note: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

security:
  - bearerAuth: []

paths:
  /vendors/{vendorId}/onboarding/applications:
    post:
      summary: Create onboarding application (vendor)
      operationId: vendorCreateApplication
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/VendorId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApplicationRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateApplicationResponse'
        '403':
          description: Not vendor owner / staff
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Open application already exists or idempotency replay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /vendors/{vendorId}/onboarding/applications/{applicationId}/business:
    put:
      summary: Upsert business profile for application (vendor)
      operationId: vendorUpsertApplicationBusiness
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/VendorId'
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VendorApplicationBusiness'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  business:
                    $ref: '#/components/schemas/VendorApplicationBusiness'
        '403': { description: Forbidden }

  /vendors/{vendorId}/onboarding/applications/{applicationId}/submit:
    post:
      summary: Submit application for review (vendor)
      operationId: vendorSubmitApplication
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/VendorId'
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Submitted (status may remain applied until auto-queue moves to under_review)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitApplicationResponse'
        '422':
          description: Validation failed (missing KYC, bank, portfolio, etc.)

  /admin/onboarding/queue:
    get:
      summary: List applications in queue (admin)
      operationId: adminOnboardingQueue
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: status
          in: query
          schema:
            type: string
            enum: [applied, under_review]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/VendorApplication'
                  nextCursor:
                    type: string
                    nullable: true
        '403': { description: Admin only }

  /admin/onboarding/applications/{applicationId}:
    get:
      summary: Application detail for review (admin)
      operationId: adminGetApplication
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminApplicationDetail'
        '403': { description: Forbidden }

  /admin/onboarding/applications/{applicationId}/approve:
    post:
      summary: Approve application (admin)
      operationId: adminApproveApplication
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveApplicationRequest'
      responses:
        '200':
          description: Application approved; vendor set active per business rules
          content:
            application/json:
              schema:
                type: object
                properties:
                  application:
                    $ref: '#/components/schemas/VendorApplication'
        '403': { description: Forbidden }
        '409': { description: Invalid state transition }

  /admin/onboarding/applications/{applicationId}/reject:
    post:
      summary: Reject application (admin)
      operationId: adminRejectApplication
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectApplicationRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  application:
                    $ref: '#/components/schemas/VendorApplication'
        '403': { description: Forbidden }

  /admin/onboarding/applications/{applicationId}/events:
    get:
      summary: Status audit trail (admin)
      operationId: adminListApplicationEvents
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApplicationEvent'
